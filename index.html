<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barra Central — Carta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Lato:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream2: #ede6d6;
    --dark: #1a1510;
    --dark2: #2a2118;
    --accent: #c8360a;
    --accent2: #e8a830;
    --muted: #4a3f32;
    --border: rgba(139,120,90,0.25);
    --text: #2a2118;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--cream);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ══════════════════════════════════
     PANTALLA DE ENTRADA
  ══════════════════════════════════ */
  #screen-entry {
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--dark);
    overflow: hidden;
  }

  /* fondo decorativo — olas halftone */
 
  .entry-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 40px 24px;
    text-align: center;
  }

  .entry-logo {
    /* SLOT: reemplaza con tu logo SVG o img */
    margin-bottom: 8px;
  }

  .entry-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 15vw, 96px);
    letter-spacing: 6px;
    color: var(--cream);
    line-height: 0.9;
    margin-bottom: 6px;
  }

  .entry-logo-sub {
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 48px;
  }

  .entry-divider {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    margin-bottom: 48px;
  }

  .entry-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .entry-buttons {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 340px;
  }

  .entry-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 28px 20px;
    background: transparent;
    border: 1px solid rgba(245,240,232,0.15);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    position: relative;
    overflow: hidden;
  }

  .entry-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.3s ease;
  }

  .entry-btn:hover::before { transform: scaleY(1); }
  .entry-btn:hover { border-color: var(--accent); }

  .entry-btn-icon {
    font-size: 28px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s ease;
  }

  .entry-btn:hover .entry-btn-icon { transform: scale(1.1); }

  .entry-btn-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--cream);
    position: relative;
    z-index: 1;
  }

  .entry-btn-sub {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
    z-index: 1;
    transition: color 0.3s;
  }

  .entry-btn:hover .entry-btn-sub { color: rgba(245,240,232,0.7); }

  .entry-address {
    margin-top: 48px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(139,120,90,0.6);
    text-transform: uppercase;
  }

  /* ══════════════════════════════════
     PANTALLA DE CARTA
  ══════════════════════════════════ */
  #screen-menu {
    background: var(--cream);
    flex-direction: column;
  }

  /* HEADER CARTA */
  .menu-header {
    background: var(--dark);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .menu-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(245,240,232,0.08);
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
  }

  .back-btn:hover { color: var(--cream); }

  .menu-header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--cream);
    transition: font-size 0.2s;
  }
  .tomar-mode .menu-header-title {
    font-size: 30px;
    letter-spacing: 5px;
  }

  .menu-toggle {
    display: flex;
    gap: 6px;
  }

  .toggle-btn {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid rgba(245,240,232,0.15);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* NAV SECCIONES — TOMAR (pills centradas) */
  .section-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--dark);
    padding: 12px 16px;
    justify-content: flex-start;
  }

  .section-nav::-webkit-scrollbar { display: none; }

  .section-nav-btn {
    flex-shrink: 0;
    padding: 8px 14px;
    background: rgba(245,240,232,0.06);
    border: 1px solid rgba(245,240,232,0.12);
    border-radius: 5px;
    color: rgba(245,240,232,0.5);
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .section-nav-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .section-nav-btn:hover:not(.active) {
    background: rgba(245,240,232,0.12);
    color: var(--cream);
  }

  /* PROMOS FOOTER */
  .promos-footer {
    background: var(--dark2);
    border-top: 1px solid rgba(245,240,232,0.08);
    padding: 20px 16px 32px;
    display: none;
  }

  .promos-footer.visible { display: block; }

  .promos-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--accent2);
    margin-bottom: 2px;
  }

  .promos-sub {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .promos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
  }

  .promo-item {
    background: rgba(245,240,232,0.04);
    border: 1px solid rgba(245,240,232,0.07);
    border-radius: 4px;
    padding: 9px 10px;
  }

  .promo-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--cream);
    margin-bottom: 2px;
  }

  .promo-desc {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.3;
  }

  .promo-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--accent);
    margin-top: 3px;
  }

  /* CONTENIDO CARTA */
  .menu-content {
    flex: 1;
    padding: 0 0 60px;
  }

  .menu-section {
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .menu-section.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SUBSECCIÓN */
  .subsection {
    margin-bottom: 0;
  }

  .subsection-header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }

  .subsection-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .subsection-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ITEMS */
  .items-grid {
    padding: 0 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* layout lista (default) */
  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    border-radius: 2px;
  }

  .item-row:last-child { border-bottom: none; }
  .item-row:active { background: rgba(200,54,10,0.04); }

  .item-body { flex: 1; }

  .item-name {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 900;
    color: var(--dark);
    margin-bottom: 4px;
    line-height: 1.2;
    letter-spacing: -0.2px;
  }

  .item-desc {
    font-size: 16px;
    color: #4a3f32;
    line-height: 1.65;
    font-weight: 400;
    font-style: normal;
  }

  .item-badge {
    display: inline-block;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    background: var(--accent);
    color: white;
    margin-left: 6px;
    vertical-align: middle;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
  }

  .item-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
    padding-top: 2px;
  }

  /* layout tarjetas */
  .items-grid.cards {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0 0 8px;
  }

  .items-grid.cards .item-row {
    flex-direction: row;
    align-items: stretch;
    background: white;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    padding: 14px 16px;
    gap: 12px;
  }

  .items-grid.cards .item-row:first-child { border-top: 1px solid var(--border); }

  .items-grid.cards .item-body { flex: 1; }

  .item-photo {
    width: 76px;
    height: 76px;
    min-width: 76px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--cream2);
    cursor: pointer;
    position: relative;
    align-self: center;
  }

  .item-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .item-photo:hover img { transform: scale(1.05); }

  .item-photo-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: var(--cream2);
    color: var(--border);
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .lightbox.open { display: flex; }

  .lightbox img {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .lightbox-close {
    position: absolute;
    top: 16px; right: 20px;
    font-size: 28px;
    color: white;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    opacity: 0.7;
  }

  .lightbox-name {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: white;
    font-weight: 700;
  }

  /* destilados: tabla compacta */
  .spirits-table {
    padding: 0 16px 16px;
  }

  .spirits-group {
    margin-bottom: 20px;
  }

  .spirits-group-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .spirit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(139,120,90,0.1);
  }

  .spirit-row:last-child { border-bottom: none; }

  .spirit-name {
    font-size: 13px;
    color: var(--dark);
    font-weight: 400;
  }

  .spirit-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--accent);
  }

  /* BOTANICAS */
  .botanicas-list {
    padding: 8px 16px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .botanica-tag {
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-weight: 300;
  }

  /* LOADING */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 500;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loader-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* SHEETS BADGE */
  .sheets-badge {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sheets-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  /* NOTA VEGANA */
  .nota-footer {
    margin: 8px 16px 0;
    padding: 10px 14px;
    background: rgba(0,0,0,0.03);
    border-left: 2px solid var(--accent2);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    border-radius: 0 3px 3px 0;
  }

  /* SECTION ANCHOR */
  .menu-section-anchor {
    scroll-margin-top: 120px;
  }

  /* IMAGEN SLOT */
  .img-slot {
    width: 100%;
    height: 140px;
    background: rgba(0,0,0,0.04);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 12px 16px 0;
    width: calc(100% - 32px);
    overflow: hidden;
    /* SLOT: reemplaza con <img src="tu-foto.jpg"> dentro */
  }

</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="loader-text">Cargando carta…</div>
</div>

<!-- ══ PANTALLA ENTRADA ══ -->
<div id="screen-entry" class="screen active">
  <div class="entry-bg"></div>
  <div class="entry-content">

    <div class="entry-logo">
      <div class="entry-logo-sub">Reñaca · Viña del Mar</div>
    </div>

    <div class="entry-divider"></div>

    <div class="entry-label">¿Qué te provoca?</div>

    <div class="entry-buttons">
      <button class="entry-btn" onclick="openMenu('comer')">
        <span class="entry-btn-icon">🍽</span>
        <span class="entry-btn-label">Comer</span>
        <span class="entry-btn-sub">Para compartir · Burgers · Más</span>
      </button>
      <button class="entry-btn" onclick="openMenu('tomar')">
        <span class="entry-btn-icon">🍹</span>
        <span class="entry-btn-label">Tomar</span>
        <span class="entry-btn-sub">Cócteles · Destilados · Vinos</span>
      </button>
    </div>

    <div class="entry-address">Central 14507 · barbarracentral.cl</div>
  </div>
</div>

<!-- ══ PANTALLA CARTA ══ -->
<div id="screen-menu" class="screen">

  <div class="menu-header">
    <div class="menu-header-inner">
      <button class="back-btn" onclick="goBack()">
        ← <span id="back-label">Inicio</span>
      </button>
      <div class="menu-header-title" id="menu-title">Comer</div>
      <div class="menu-toggle">
        <button class="toggle-btn active" id="btn-lista" onclick="setLayout('lista')">Lista</button>
        <button class="toggle-btn" id="btn-cards" onclick="setLayout('cards')">Cards</button>
      </div>
    </div>
    <div class="section-nav" id="section-nav"></div>
  </div>

  <div class="menu-content" id="menu-content"></div>

  <!-- PROMOS FOOTER -->
  <div class="promos-footer" id="promos-footer">
    <div class="promos-title">Promociones de la semana</div>
    <div class="promos-sub">Hasta las 21:00 hrs.</div>
    <div class="promos-grid" id="promos-grid"></div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-name" id="lightbox-name"></div>
</div>

<!-- BADGE SHEETS -->
<div class="sheets-badge" id="sheets-badge" style="display:none">
  <div class="sheets-dot"></div>
  Datos desde Google Sheets
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIGURACIÓN GOOGLE SHEETS
// ═══════════════════════════════════════════════════════
// Para conectar a Google Sheets:
// 1. Crea un Sheets con las columnas: seccion | subseccion | nombre | descripcion | precio | badge | nuevo
// 2. Archivo → Compartir → Publicar en la web → CSV
// 3. Copia la URL y pégala aquí:
const SHEETS_CSV_URL = ''; // <-- pega aquí tu URL de Google Sheets publicado como CSV

// ═══════════════════════════════════════════════════════
// DATOS HARDCODED (se usan si no hay Sheets configurado)
// ═══════════════════════════════════════════════════════
const DATA_HARDCODED = {
  comer: {

      {
        id: 'compartir',

          { nombre: 'Piqueo los Lilenes', emoji: '🦐', desc: 'Nuestra versión de la Chorillana con calamares, camarones, calugas de pescado, salsa acilantrada y huevos pochados.', precio: 16900 },
          { nombre: 'Maíz y alcachofas', emoji: '🌽', desc: 'Maíz dulce en costra de sal y limón, corazones de alcachofa fritos con sus salsas.', precio: 9900 },
          { nombre: 'Milanesa de Ojo de Bife', emoji: '🥩', desc: 'Viene con chimi tradicional y dos huevos fritos.', precio: 17500 },
          { nombre: 'Lomo Vetado Angus', emoji: '🥩', desc: '400 gr a la parrilla con salsa chimichurri. (Según disponibilidad)', precio: 19000 },

// ═══════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════
let currentMode = 'comer';
let currentSection = 0;
let layout = 'lista';
let data = DATA_HARDCODED;

// ═══════════════════════════════════════════════════════
// GOOGLE SHEETS LOADER
// ═══════════════════════════════════════════════════════
async function tryLoadSheets() {
  if (!SHEETS_CSV_URL) return false;
  try {
    const r = await fetch(SHEETS_CSV_URL);
    const text = await r.text();
    // Parsear CSV simple
    const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.trim().replace(/^"|"$/g,'')));
    const headers = rows[0]; // seccion,subseccion,nombre,descripcion,precio,badge,nuevo
    // TODO: mapear rows a la estructura de data
    // Por ahora se usa el hardcoded como fallback
    document.getElementById('sheets-badge').style.display = 'flex';
    return true;
  } catch(e) {
    return false;
  }
}

// ═══════════════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════════════
function openMenu(mode) {
  currentMode = mode;
  currentSection = -1; // -1 = "Todo"
  document.getElementById('screen-entry').classList.remove('active');
  document.getElementById('screen-menu').classList.add('active');
  document.getElementById('menu-title').textContent = mode === 'comer' ? 'Para Comer' : 'Para Tomar';

  // tomar-mode class for bigger title
  const inner = document.querySelector('.menu-header-inner');
  if (mode === 'tomar') {
    inner.classList.add('tomar-mode');
  } else {
    inner.classList.remove('tomar-mode');
  }

  // promos footer
  const footer = document.getElementById('promos-footer');
  if (mode === 'tomar' && data.tomar.promos) {
    footer.classList.add('visible');
    renderPromos();
  } else {
    footer.classList.remove('visible');
  }

  renderNav();
  renderAllSections(); // muestra toda la carta junta
  setupScrollSpy();
}

function goBack() {
  document.getElementById('screen-menu').classList.remove('active');
  document.getElementById('screen-entry').classList.add('active');
}

function setLayout(l) {
  layout = l;
  document.getElementById('btn-lista').classList.toggle('active', l === 'lista');
  document.getElementById('btn-cards').classList.toggle('active', l === 'cards');
  renderAllSections();
  setupScrollSpy();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderPromos() {
  const promos = data.tomar.promos;
  const grid = document.getElementById('promos-grid');
  grid.innerHTML = promos.map(p => `
    <div class="promo-item">
      <div class="promo-day">${p.dia}</div>
      <div class="promo-desc">${p.desc}</div>
      ${p.precio ? `<div class="promo-price">${p.precio}</div>` : ''}
    </div>
  `).join('');
}

function renderNav() {
  const sections = data[currentMode].sections;
  const nav = document.getElementById('section-nav');
  const modeLabel = currentMode === 'tomar' ? '🍹 Carta de tragos' : '🍽️ Todo';
  const todoPill = `<button class="section-nav-btn active" onclick="scrollToSection(-1)" id="nav--1">${modeLabel}</button>`;
  const pills = sections.map((s,i) => `
    <button class="section-nav-btn" onclick="scrollToSection(${i})" id="nav-${i}">${s.label}</button>
  `).join('');
  nav.innerHTML = todoPill + pills;
}

function renderAllSections() {
  const sections = data[currentMode].sections;
  const content = document.getElementById('menu-content');
  content.innerHTML = sections.map((s, i) => {
    const inner = s.spirits ? renderSpiritsSection(s) : renderItemsSectionInner(s);
    return `<div class="menu-section-anchor" id="anchor-${i}" data-idx="${i}">
      <div class="subsection-header">
        <span class="subsection-title">${s.label}</span>
      </div>
      ${inner}
    </div>`;
  }).join('');
}

function scrollToSection(idx) {
  if (idx === -1) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    setActiveNav(-1);
    return;
  }
  const anchor = document.getElementById('anchor-' + idx);
  if (anchor) {
    const headerH = document.querySelector('.menu-header').offsetHeight;
    const top = anchor.getBoundingClientRect().top + window.scrollY - headerH - 8;
    window.scrollTo({ top, behavior: 'smooth' });
    setActiveNav(idx);
  }
}

function setActiveNav(idx) {
  currentSection = idx;
  document.querySelectorAll('.section-nav-btn').forEach((b, i) => {
    // i=0 is "Todo" (idx=-1), i=1..n are sections 0..n-1
    b.classList.toggle('active', (i === 0 && idx === -1) || (i === idx + 1));
  });
  // scroll nav pill into view
  const activeBtn = document.querySelector('.section-nav-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

let scrollSpyObserver = null;
function setupScrollSpy() {
  if (scrollSpyObserver) scrollSpyObserver.disconnect();
  setTimeout(() => {
    const headerH = document.querySelector('.menu-header').offsetHeight;
    scrollSpyObserver = new IntersectionObserver((entries) => {
      // pick the topmost intersecting entry
      const visible = entries.filter(e => e.isIntersecting);
      if (!visible.length) return;
      const top = visible.reduce((a,b) => a.boundingClientRect.top < b.boundingClientRect.top ? a : b);
      const idx = parseInt(top.target.dataset.idx);
      setActiveNav(idx);
    }, {
      root: null,
      rootMargin: `-${headerH + 2}px 0px -55% 0px`,
      threshold: 0
    });
    document.querySelectorAll('.menu-section-anchor').forEach(el => {
      scrollSpyObserver.observe(el);
    });
  }, 300);
}

function formatPrice(p) {
  if (!p) return '';
  return '$' + Number(p).toLocaleString('es-CL');
}

function renderItemsSectionInner(s) {
  const isCards = layout === 'cards';
  const gridClass = isCards ? 'items-grid cards' : 'items-grid';
  const items = s.items.map(item => {
    const photoSlot = isCards ? `
      <div class="item-photo" onclick="openLightbox('${(item.imagen||'').replace(/'/g,"\'")}','${item.nombre.replace(/'/g,"\'")}')">
        ${item.imagen
          ? `<img src="${item.imagen}" alt="${item.nombre}" loading="lazy">`
          : `<div class="item-photo-placeholder">${item.emoji||'🍽️'}</div>`
        }
      </div>` : '';

    return `<div class="item-row">
      <div class="item-body">
        <div class="item-name">
          ${item.nombre}
          ${item.nuevo ? '<span class="item-badge">New</span>' : ''}
        </div>
        ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        <div class="item-price" style="${isCards?'margin-top:6px':'display:none'}">
          ${item.precio2 ? `${formatPrice(item.precio)} <small style="font-size:12px;color:var(--muted)">/ ${formatPrice(item.precio2)} jarra</small>` : formatPrice(item.precio)}
        </div>
      </div>
      ${isCards ? photoSlot : `<div class="item-price">${item.precio2 ? `${formatPrice(item.precio)}<br><small style="font-size:12px;color:var(--muted)">${formatPrice(item.precio2)} jarra</small>` : formatPrice(item.precio)}</div>`}
    </div>`;
  }).join('');

  return `
    <div class="subsection">
      <div class="${gridClass}">
        ${items}
      </div>
      ${s.nota ? `<div class="nota-footer">${s.nota}</div>` : ''}
    </div>
  `;
}

function renderSpiritsSection(s) {
  if (s.id === 'destilados') {
    const groups = s.groups.map(g => `
      <div class="spirits-group">
        <div class="spirits-group-title">${g.nombre}</div>
        ${g.items.map(i => `
          <div class="spirit-row">
            <span class="spirit-name">${i.nombre}</span>
            <span class="spirit-price">${formatPrice(i.precio)}</span>
          </div>
        `).join('')}
      </div>
    `).join('');

    const botanicas = s.botanicas ? `
      <div class="subsection-header"><span class="subsection-title">Botánicas</span></div>
      <div class="botanicas-list">
        ${s.botanicas.map(b => `<span class="botanica-tag">${b}</span>`).join('')}
      </div>
    ` : '';

    const tonicas = s.tonicas ? `
      <div class="subsection-header"><span class="subsection-title">Tónicas</span></div>
      <div class="spirits-table">
        <div class="spirits-group">
          ${s.tonicas.map(i => `
            <div class="spirit-row">
              <span class="spirit-name">${i.nombre}</span>
              <span class="spirit-price">${formatPrice(i.precio)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    ` : '';

    return `<div class="spirits-table">${groups}</div>${botanicas}${tonicas}`;
  }

  // vinos y más
  const groups = s.groups.map(g => `
    <div class="subsection">
      <div class="subsection-header"><span class="subsection-title">${g.nombre}</span></div>
      <div class="spirits-table">
        <div class="spirits-group">
          ${g.items.map(i => `
            <div class="spirit-row">
              <span class="spirit-name">${i.nombre}</span>
              <span class="spirit-price">${formatPrice(i.precio)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');

  return `<div>${groups}</div>`;
}

function openLightbox(src, name) {
  if (!src) return;
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-name').textContent = name;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

window.addEventListener('load', async () => {
  await tryLoadSheets();
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 600);
});
