<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barra Central — Carta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Lato:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream2: #ede6d6;
    --bg-entry: #f5f0e8;
    --bg-header: #1a1510;
    --bg-header2: #141008;
    --bg-menu: #f5f0e8;
    --bg-item: #ffffff;
    --bg-item-alt: #faf7f2;
    --dark: #1a1510;
    --dark2: #2a2118;
    --accent: #c8360a;
    --accent2: #b07810;
    --muted: #6a5f52;
    --muted2: #8a7a6a;
    --border: rgba(139,120,90,0.2);
    --border2: rgba(139,120,90,0.35);
    --text: #2a2118;
    --text2: #6a5f52;
    --spirit-bg: #faf7f2;
    --nota-bg: rgba(0,0,0,0.03);
    --promo-bg: #2a2118;
    --promo-item: rgba(245,240,232,0.06);
    --promo-border: rgba(245,240,232,0.1);
    --shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }


  html, body {
    height: 100%;
    background: var(--bg-menu);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.4;
  }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }
  #screen-entry.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ══════════════════════════════════
     PANTALLA DE ENTRADA
  ══════════════════════════════════ */
  #screen-entry {
    align-items: center;
    justify-content: center;
    position: relative;
    background-color: var(--bg-entry);
    background-image: url('entry-bg.png');
    background-size: auto 100%;
    background-position: top left;
    background-repeat: repeat-x;
    overflow: hidden;
  }

  /* overlay suave para legibilidad del texto */
  #screen-entry::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(245,240,232,0.72);
    pointer-events: none;
    z-index: 1;
  }

  .entry-content { position: relative; z-index: 2; }

  .entry-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 40px 24px;
    text-align: center;
    width: 100%;
    max-width: 400px;
  }

  .entry-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 15vw, 96px);
    letter-spacing: 2px;
    color: var(--dark);
    line-height: 0.9;
    margin-bottom: 6px;
  }

  .entry-logo-sub {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .entry-divider {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    margin-bottom: 36px;
  }

  .entry-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .entry-buttons {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 36px;
  }

  .entry-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 28px 20px;
    background: transparent;
    border: 1px solid rgba(42,33,24,0.18);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .entry-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.3s ease;
  }

  .entry-btn:hover::before { transform: scaleY(1); }
  .entry-btn:hover { border-color: var(--accent); }

  .entry-btn-icon {
    font-size: 28px;
    position: relative;
    z-index: 1;
    transition: transform 0.3s ease;
  }
  .entry-btn:hover .entry-btn-icon { transform: scale(1.1); }

  .entry-btn-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--dark);
    position: relative;
    z-index: 1;
  }

  .entry-btn-sub {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
    z-index: 1;
    
  }
  .entry-btn:hover .entry-btn-sub { color: rgba(245,240,232,0.7); }

  /* LINKS SOCIALES ENTRY */
  .entry-links {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .entry-link {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1px solid rgba(42,33,24,0.2);
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }

  .entry-link:hover {
    background: rgba(42,33,24,0.06);
    color: var(--dark);
    border-color: rgba(42,33,24,0.4);
  }

  .entry-link svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    flex-shrink: 0;
  }

  .entry-address {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(139,120,90,0.5);
    text-transform: uppercase;
  }


  /* ══════════════════════════════════
     PANTALLA DE CARTA
  ══════════════════════════════════ */
  #screen-menu {
    background: var(--bg-menu);
    flex-direction: column;
    transition: background 0.3s;
  }

  .menu-header {
    background: var(--bg-header);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }

  .menu-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(245,240,232,0.07);
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
  }
  .back-btn:hover { color: var(--cream); }

  .menu-header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--cream);
  }

  .menu-toggle {
    display: flex;
    gap: 6px;
  }

  .toggle-btn {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid rgba(245,240,232,0.15);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .toggle-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── SECTION NAV ── */
  .section-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--bg-header2);
    padding: 10px 14px;
    -webkit-overflow-scrolling: touch;
    /* CRÍTICO: permite scroll horizontal real */
    scroll-snap-type: x proximity;
  }

  .section-nav::-webkit-scrollbar { display: none; }

  .section-nav-btn {
    flex-shrink: 0;            /* no se encoge nunca */
    padding: 7px 13px;
    background: rgba(245,240,232,0.05);
    border: 1px solid rgba(245,240,232,0.1);
    border-radius: 5px;
    color: rgba(245,240,232,0.4);
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    scroll-snap-align: start;
  }

  .section-nav-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .section-nav-btn:hover:not(.active) {
    background: rgba(245,240,232,0.1);
    color: var(--cream);
  }

  /* ══════════════════════════════════
     CONTENIDO
  ══════════════════════════════════ */
  .menu-content {
    flex: 1;
    padding: 0 0 60px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .subsection-header {
    padding: 20px 18px 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .subsection-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .subsection-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* LISTA */
  .items-grid {
    padding: 0 16px 8px;
    display: flex;
    flex-direction: column;
  }

  .item-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 4px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .item-row:last-child { border-bottom: none; }
  .item-row:active { background: rgba(200,54,10,0.05); }

  .item-body { flex: 1; }

  .item-name {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 4px;
    line-height: 1.2;
    
  }

  .item-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.55;
    
  }

  .item-badge {
    display: inline-block;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 5px;
    border-radius: 2px;
    background: var(--accent);
    color: white;
    margin-left: 5px;
    vertical-align: middle;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
  }

  .item-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
    padding-top: 2px;
  }

  /* CARDS */
  .items-grid.cards {
    padding: 0 0 8px;
    background: var(--bg-item-alt);
  }

  .items-grid.cards .item-row {
    background: var(--bg-item);
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    padding: 13px 16px;
    gap: 12px;
  }

  .items-grid.cards .item-row:first-child { border-top: 1px solid var(--border); }

  .item-photo {
    width: 72px;
    height: 72px;
    min-width: 72px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg-item-alt);
    cursor: pointer;
    align-self: center;
  }

  .item-photo img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
  .item-photo:hover img { transform:scale(1.06); }

  .item-photo-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: var(--bg-item-alt);
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width:100%; max-height:85vh; border-radius:8px; }
  .lightbox-close { position:absolute; top:16px; right:20px; font-size:28px; color:white; cursor:pointer; background:none; border:none; opacity:0.7; }
  .lightbox-name { position:absolute; bottom:24px; left:0; right:0; text-align:center; font-family:'Inter',sans-serif; font-size:15px; color:white; font-weight:700; }

  /* DESTILADOS */
  .spirits-table { padding: 0 16px 16px; }
  .spirits-group { margin-bottom: 18px; }
  .spirits-group-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 7px 0 5px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
  }
  .spirit-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(139,120,90,0.08);
  }
  .spirit-row:last-child { border-bottom: none; }
  .spirit-name { font-size: 13px; color: var(--dark); }
  .spirit-price { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--accent); }

  /* BOTANICAS */
  .botanicas-list { padding: 6px 16px 14px; display:flex; flex-wrap:wrap; gap:5px; }
  .botanica-tag {
    font-size: 11px; padding: 3px 10px;
    border: 1px solid var(--border); border-radius:20px;
    color: var(--muted); font-weight:300;
  }

  /* NOTA */
  .nota-footer {
    margin: 6px 16px 0;
    padding: 8px 12px;
    background: var(--nota-bg);
    border-left: 2px solid var(--accent2);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    border-radius: 0 3px 3px 0;
  }

  /* PROMOS */
  .promos-footer {
    background: var(--promo-bg);
    border-top: 1px solid rgba(245,240,232,0.08);
    padding: 18px 16px 32px;
    display: none;
  }
  .promos-footer.visible { display: block; }
  .promos-title { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px; color:var(--accent2); margin-bottom:2px; }
  .promos-sub { font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
  .promos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:7px; }
  .promo-item { background:var(--promo-item); border:1px solid var(--promo-border); border-radius:4px; padding:8px 10px; }
  .promo-day { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:1.5px; color:var(--cream); margin-bottom:2px; }
  .promo-desc { font-size:10px; color:var(--muted); line-height:1.3; }
  .promo-price { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--accent); margin-top:2px; }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset:0; background:var(--bg-entry);
    display:flex; align-items:center; justify-content:center;
    z-index:500; transition:opacity 0.4s;
  }
  .loading-overlay.hidden { opacity:0; pointer-events:none; }
  .loader-text { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:4px; color:var(--muted); text-transform:uppercase; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ANCHOR */
  .menu-section-anchor { scroll-margin-top: 95px; }
</style>
</head>

// ═══════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════
let currentMode = 'comer';
let layout = 'lista';

// ═══════════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════════
function openMenu(mode) {
  currentMode = mode;
  document.getElementById('screen-entry').classList.remove('active');
  document.getElementById('screen-menu').classList.add('active');
  document.getElementById('menu-title').textContent = mode === 'comer' ? 'Para Comer' : 'Para Tomar';

  const footer = document.getElementById('promos-footer');
  if (mode === 'tomar' && DATA.tomar.promos) {
    footer.classList.add('visible');
    renderPromos();
  } else {
    footer.classList.remove('visible');
  }

  renderNav();
  renderAllSections();

  // Esperar el primer paint antes de configurar spy y posición
  requestAnimationFrame(() => {
    window.scrollTo({ top: 0, behavior: 'instant' });
    setupScrollSpy();
  });
}

function goBack() {
  document.getElementById('screen-menu').classList.remove('active');
  document.getElementById('screen-entry').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function setLayout(l) {
  layout = l;
  document.getElementById('btn-lista').classList.toggle('active', l === 'lista');
  document.getElementById('btn-cards').classList.toggle('active', l === 'cards');
  renderAllSections();
  setupScrollSpy();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ═══════════════════════════════════════════════════
// NAV PILLS — scroll horizontal correcto
// ═══════════════════════════════════════════════════
function renderNav() {
  const sections = DATA[currentMode].sections;
  const nav = document.getElementById('section-nav');
  nav.innerHTML = sections.map((s, i) =>
    `<button class="section-nav-btn${i===0?' active':''}" onclick="scrollToSection(${i})" id="nav-${i}">${s.label}</button>`
  ).join('');
}

function setActiveNav(idx) {
  document.querySelectorAll('.section-nav-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  // scroll la pill activa al centro de la barra
  const activeBtn = document.getElementById('nav-' + idx);
  if (activeBtn) {
    const nav = document.getElementById('section-nav');
    const btnLeft = activeBtn.offsetLeft;
    const btnW = activeBtn.offsetWidth;
    const navW = nav.offsetWidth;
    nav.scrollTo({ left: btnLeft - navW / 2 + btnW / 2, behavior: 'smooth' });
  }
}

function scrollToSection(idx) {
  const anchor = document.getElementById('anchor-' + idx);
  if (!anchor) return;
  setActiveNav(idx);
  // scrollIntoView funciona aunque el layout acaba de cambiar
  anchor.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ═══════════════════════════════════════════════════
// SCROLL SPY — IntersectionObserver correcto
// ═══════════════════════════════════════════════════
let spyObserver = null;

function setupScrollSpy() {
  if (spyObserver) { spyObserver.disconnect(); spyObserver = null; }

  // Esperamos a que el DOM esté pintado
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const headerH = document.querySelector('.menu-header').offsetHeight;
      // rootMargin: top negativo = el trigger ocurre cuando el anchor
      // entra en la zona visible justo debajo del header
      spyObserver = new IntersectionObserver((entries) => {
        // Tomamos el anchor con boundingClientRect.top más cercano al header
        const visible = entries
          .filter(e => e.isIntersecting)
          .sort((a, b) => Math.abs(a.boundingClientRect.top) - Math.abs(b.boundingClientRect.top));
        if (!visible.length) return;
        const idx = parseInt(visible[0].target.dataset.idx, 10);
        setActiveNav(idx);
      }, {
        root: null,
        rootMargin: `-${headerH + 4}px 0px -40% 0px`,
        threshold: 0
      });

      document.querySelectorAll('.menu-section-anchor').forEach(el => {
        spyObserver.observe(el);
      });
    });
  });
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function formatPrice(p) {
  if (!p) return '';
  return '$' + Number(p).toLocaleString('es-CL');
}

function renderPromos() {
  const grid = document.getElementById('promos-grid');
  grid.innerHTML = DATA.tomar.promos.map(p => `
    <div class="promo-item">
      <div class="promo-day">${p.dia}</div>
      <div class="promo-desc">${p.desc}</div>
      ${p.precio ? `<div class="promo-price">${p.precio}</div>` : ''}
    </div>
  `).join('');
}

function renderAllSections() {
  const sections = DATA[currentMode].sections;
  const content = document.getElementById('menu-content');
  content.innerHTML = sections.map((s, i) => {
    const inner = s.spirits ? renderSpiritsSection(s) : renderItemsSectionInner(s);
    return `<div class="menu-section-anchor" id="anchor-${i}" data-idx="${i}">${inner}</div>`;
  }).join('');
}

function renderItemsSectionInner(s) {
  const isCards = layout === 'cards';
  const gridClass = isCards ? 'items-grid cards' : 'items-grid';

  const items = s.items.map(item => {
    const photoSlot = isCards ? `
      <div class="item-photo" onclick="openLightbox('${(item.imagen||'').replace(/'/g,"\\'")}','${item.nombre.replace(/'/g,"\\'")}')">
        ${item.imagen
          ? `<img src="${item.imagen}" alt="${item.nombre}" loading="lazy">`
          : `<div class="item-photo-placeholder">${item.emoji || '🍽️'}</div>`
        }
      </div>` : '';

    const priceHtml = item.precio2
      ? `${formatPrice(item.precio)}<br><small style="font-size:11px;color:var(--muted)">${formatPrice(item.precio2)} jarra</small>`
      : formatPrice(item.precio);

    return `<div class="item-row">
      <div class="item-body">
        <div class="item-name">${item.nombre}${item.nuevo ? '<span class="item-badge">New</span>' : ''}</div>
        ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
        ${isCards ? `<div class="item-price" style="margin-top:5px">${priceHtml}</div>` : ''}
      </div>
      ${isCards ? photoSlot : `<div class="item-price">${priceHtml}</div>`}
    </div>`;
  }).join('');

  return `
    <div class="subsection-header"><span class="subsection-title">${s.label}</span></div>
    <div class="subsection">
      <div class="${gridClass}">${items}</div>
      ${s.nota ? `<div class="nota-footer">${s.nota}</div>` : ''}
    </div>
  `;
}

function renderSpiritsSection(s) {
  if (s.id === 'destilados') {
    const groups = s.groups.map(g => `
      <div class="spirits-group">
        <div class="spirits-group-title">${g.nombre}</div>
        ${g.items.map(i => `
          <div class="spirit-row">
            <span class="spirit-name">${i.nombre}</span>
            <span class="spirit-price">${formatPrice(i.precio)}</span>
          </div>
        `).join('')}
      </div>
    `).join('');

    const botanicas = s.botanicas ? `
      <div class="subsection-header"><span class="subsection-title">Botánicas</span></div>
      <div class="botanicas-list">${s.botanicas.map(b => `<span class="botanica-tag">${b}</span>`).join('')}</div>
    ` : '';

    const tonicas = s.tonicas ? `
      <div class="subsection-header"><span class="subsection-title">Tónicas</span></div>
      <div class="spirits-table">
        <div class="spirits-group">
          ${s.tonicas.map(i => `
            <div class="spirit-row">
              <span class="spirit-name">${i.nombre}</span>
              <span class="spirit-price">${formatPrice(i.precio)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    ` : '';

    return `
      <div class="subsection-header"><span class="subsection-title">${s.label}</span></div>
      <div class="spirits-table">${groups}</div>
      ${botanicas}${tonicas}
    `;
  }

  // vinos y más
  const groups = s.groups.map(g => `
    <div class="subsection">
      <div class="subsection-header"><span class="subsection-title">${g.nombre}</span></div>
      <div class="spirits-table">
        <div class="spirits-group">
          ${g.items.map(i => `
            <div class="spirit-row">
              <span class="spirit-name">${i.nombre}</span>
              <span class="spirit-price">${formatPrice(i.precio)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');

  return `
    <div class="subsection-header"><span class="subsection-title">${s.label}</span></div>
    <div>${groups}</div>
  `;
}

// ═══════════════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════════════
function openLightbox(src, name) {
  if (!src) return;
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-name').textContent = name;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 500);
});
</script>
